# Alembic configuration for Claimflow claim persistence schema.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

# Overridden at runtime by alembic/env.py from Settings.database_url
sqlalchemy.url = postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
