name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src tests

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: claimflow
          POSTGRES_PASSWORD: claimflow
          POSTGRES_DB: claimflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claimflow -d claimflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://claimflow:claimflow@localhost:5432/claimflow
      DATABASE_URL: postgresql://claimflow:claimflow@localhost:5432/claimflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run pytest with coverage
        run: >
          pytest -v
          --cov=claimflow
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-report=html:htmlcov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: claimflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
